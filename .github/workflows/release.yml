name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            bin: logseq-ast
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            bin: logseq-ast
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
            bin: logseq-ast
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            bin: logseq-ast.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p logseq-ast --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/logseq-ast-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.tar.gz ${{ matrix.bin }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target\${{ matrix.target }}\release\${{ matrix.bin }} -DestinationPath dist\logseq-ast-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
