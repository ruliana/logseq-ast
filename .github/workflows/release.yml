name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            bin: logseq-ast
            use_cross: false

          # Linux (Raspberry Pi)
          # - Pi 64-bit OS (or ARM servers)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64
            bin: logseq-ast
            use_cross: true
          # - Pi 32-bit OS (armv7)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_suffix: linux-armv7
            bin: logseq-ast
            use_cross: true

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            bin: logseq-ast
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
            bin: logseq-ast
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p logseq-ast --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p logseq-ast --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/logseq-ast-${{ github.ref_name }}-${{ matrix.artifact_suffix }}.tar.gz ${{ matrix.bin }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
